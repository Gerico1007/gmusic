# ═══════════════════════════════════════════════════════════════
# USAGE NOTES
# ═══════════════════════════════════════════════════════════════
#
# PATTERN MATCHING:
# - Patterns match command start (e.g., "git commit" matches "git commit -m 'message'")
# - More specific patterns should come before general ones
# - Use longest match wins strategy
#
# MUSICAL ELEMENTS:
# - Key: Emotional state (major=positive, minor=searching/problem)
# - Meter: Activity rhythm (4/4=steady, 6/8=flowing, 3/4=light)
# - Motif: Actual musical pattern in ABC notation
# - Description: Human-readable explanation
#
# CUSTOMIZATION:
# - Add your own command patterns following the format
# - Experiment with different keys/meters for different emotions
# - Use chromatic notes (^,_) for searching/investigation
# - Use ascending patterns for building/success
# - Use descending patterns for completion/closure
